<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERIKSILA - Rasmiy Kanallarimiz</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --green:#00ff7f;
  --dark:#0a0a0a;
  --card:#161616;
  --border:#252525;
  --text:#fff;
  --muted:#777;
}

body{
  background:var(--dark);
  color:var(--text);
  font-family:'Montserrat',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 16px;
  overflow-x:hidden;
  position:relative;
}

/* ── ANIMATED BACKGROUND ── */
.bg-canvas{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}

.bg-canvas canvas{
  width:100%;
  height:100%;
}

/* Static glow layers */
.bg-canvas::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 700px 500px at 50% -50px, rgba(0,255,127,0.13) 0%, transparent 65%),
    radial-gradient(ellipse 500px 400px at 90% 100%, rgba(0,200,100,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 400px 300px at 10% 80%, rgba(0,150,80,0.05) 0%, transparent 60%);
  pointer-events:none;
}

/* ── CONTAINER ── */
.container{
  position:relative;
  z-index:1;
  width:100%;
  max-width:460px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}

/* ── PROFILE ── */
.profile{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  margin-bottom:30px;
  animation:fadeDown .7s ease both;
}

/* Avatar with spinning ring */
.avatar-wrap{
  position:relative;
  width:100px;
  height:100px;
}

.ring{
  position:absolute;
  inset:-4px;
  border-radius:50%;
  background:conic-gradient(
    var(--green) 0deg,
    #00cc66 90deg,
    #007733 180deg,
    #003d1a 270deg,
    var(--green) 360deg
  );
  animation:spinRing 3s linear infinite;
}

.ring2{
  position:absolute;
  inset:-9px;
  border-radius:50%;
  background:conic-gradient(
    transparent 0deg,
    rgba(0,255,127,.25) 60deg,
    transparent 120deg,
    transparent 180deg,
    rgba(0,255,127,.15) 240deg,
    transparent 300deg
  );
  animation:spinRing 5s linear infinite reverse;
}

@keyframes spinRing{to{transform:rotate(360deg)}}

.avatar-inner{
  position:absolute;
  inset:3px;
  border-radius:50%;
  overflow:hidden;
  border:3px solid var(--dark);
  background:#1a1a1a;
  z-index:1;
}

.avatar-inner img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(32px,9vw,46px);
  letter-spacing:.05em;
  text-align:center;
  line-height:1;
  background:linear-gradient(135deg,#fff 20%,var(--green) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.subtitle{
  font-size:10.5px;
  font-weight:700;
  letter-spacing:.18em;
  color:var(--muted);
  text-align:center;
  text-transform:uppercase;
}

.live-dot{
  display:inline-block;
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 6px var(--green);
  animation:pulse 1.6s ease-in-out infinite;
  vertical-align:middle;
  margin-right:6px;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ── LINK BUTTONS ── */
.links{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:11px;
}

.link-btn{
  display:flex;
  align-items:center;
  gap:0;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:0;
  text-decoration:none;
  color:var(--text);
  font-weight:800;
  font-size:13px;
  letter-spacing:.12em;
  text-transform:uppercase;
  cursor:pointer;
  transition:border-color .25s,transform .2s,box-shadow .25s,background .25s;
  position:relative;
  overflow:hidden;
  animation:fadeUp .6s ease both;
}

.link-btn:nth-child(1){animation-delay:.12s}
.link-btn:nth-child(2){animation-delay:.22s}
.link-btn:nth-child(3){animation-delay:.32s}

/* Shimmer sweep on hover */
.link-btn::after{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.06),transparent);
  transition:left .5s ease;
}
.link-btn:hover::after{left:150%}

.link-btn:hover{
  border-color:var(--green);
  background:#1c1c1c;
  transform:translateY(-2px) scale(1.01);
  box-shadow:0 10px 36px rgba(0,255,127,.18),0 0 0 1px rgba(0,255,127,.12);
}
.link-btn:active{transform:translateY(0) scale(.99)}

/* Icon side */
.btn-icon{
  width:62px;
  height:62px;
  border-radius:16px 0 0 16px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

.btn-icon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Label */
.btn-label{
  flex:1;
  text-align:center;
}

/* Platform colors for icon backgrounds */
.telegram .btn-icon{background:linear-gradient(135deg,#1a3a5c,#1d5a8a)}
.kick .btn-icon{background:linear-gradient(135deg,#0a2a0a,#1a4a10)}
.youtube .btn-icon{background:linear-gradient(135deg,#3a0a0a,#6a1010)}

/* ── FOOTER ── */
.footer{
  margin-top:30px;
  font-size:10px;
  color:#333;
  letter-spacing:.12em;
  text-transform:uppercase;
  animation:fadeUp .6s .5s ease both;
}

/* ── ANIMATIONS ── */
@keyframes fadeDown{
  from{opacity:0;transform:translateY(-24px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px)}
  to{opacity:1;transform:translateY(0)}
}
</style>

<script>
// ── PARTICLE BACKGROUND ──
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkParticle(){
    return {
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.8 + .3,
      vx: (Math.random()-.5)*.35,
      vy: (Math.random()-.5)*.35,
      alpha: Math.random()*.6+.1,
      pulse: Math.random()*Math.PI*2
    };
  }

  function init(){
    resize();
    particles = Array.from({length:90}, mkParticle);
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    const t = Date.now()/1000;

    // Moving gradient blobs
    const blobs = [
      {x:.5,y:-.1,r:350,a:.1},
      {x:.85,y:.9,r:280,a:.06},
      {x:.1,y:.7,r:200,a:.04},
    ];
    blobs.forEach(b=>{
      const grd = ctx.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,b.r);
      grd.addColorStop(0,`rgba(0,255,127,${b.a})`);
      grd.addColorStop(1,'rgba(0,255,127,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(b.x*W,b.y*H,b.r,0,Math.PI*2);
      ctx.fill();
    });

    // Particles
    particles.forEach(p=>{
      p.pulse += .018;
      const alpha = p.alpha*(0.6+0.4*Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(0,255,127,${alpha})`;
      ctx.fill();

      p.x += p.vx;
      p.y += p.vy;
      if(p.x<-5) p.x=W+5;
      if(p.x>W+5) p.x=-5;
      if(p.y<-5) p.y=H+5;
      if(p.y>H+5) p.y=-5;
    });

    // Connecting lines between close particles
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x;
        const dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<100){
          ctx.beginPath();
          ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle=`rgba(0,255,127,${.1*(1-dist/100)})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  init();
  draw();
  window.addEventListener('resize', init);
})();
</script>
